<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My V2Ray Subscription</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-2xl mx-auto px-6 py-20 text-center">
    <h1 class="text-4xl font-bold mb-3">My V2Ray Subscription</h1>
    <p class="text-emerald-400 mb-8">Auto-updates every 30 minutes • Base64 Format</p>
    
    <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 mb-10">
      <p id="subUrl" class="font-mono text-sm break-all text-emerald-300 bg-black p-4 rounded-2xl mb-6">
        Loading...
      </p>
      <button onclick="copyUrl()" 
              class="bg-emerald-600 hover:bg-emerald-500 transition px-8 py-4 rounded-2xl font-medium text-lg w-full">
        Copy Subscription URL
      </button>
    </div>

    <p class="text-zinc-500 text-sm">Paste in V2RayN → Subscription Group</p>
  </div>

  <script>
    const repoName = window.location.pathname.split('/')[1] || '';
    const subUrl = `${window.location.origin}/${repoName}/sub.txt`;
    document.getElementById('subUrl').textContent = subUrl;

    function copyUrl() {
      navigator.clipboard.writeText(subUrl).then(() => {
        alert("✅ URL copied! Paste it in V2RayN.");
      });
    }
  </script>
</body>
</html>
