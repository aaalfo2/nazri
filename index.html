<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Free V2Ray Subscription</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100">
  <div class="max-w-2xl mx-auto px-6 py-16 text-center">
    <h1 class="text-4xl font-bold mb-4">My V2Ray Subscription</h1>
    <p class="text-zinc-400 mb-8">Updated from public sources • Auto-refreshes in V2RayN</p>
    
    <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 mb-8">
      <p class="text-emerald-400 font-mono break-all text-sm mb-6">
        https://YOUR-USERNAME.github.io/YOUR-REPO-NAME/sub.txt
      </p>
      <button onclick="copyUrl()" 
              class="bg-emerald-600 hover:bg-emerald-500 px-8 py-4 rounded-2xl font-medium text-lg">
        Copy Subscription URL
      </button>
    </div>

    <p class="text-sm text-zinc-500">Just paste the URL above into V2RayN → Subscription Group</p>
  </div>

  <script>
    function copyUrl() {
      const url = window.location.origin + "/sub.txt";
      navigator.clipboard.writeText(url).then(() => alert("✅ Subscription URL copied!"));
    }
  </script>
</body>
</html>
