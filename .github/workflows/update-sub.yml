name: Update V2Ray Subscription

on:
  schedule:
    - cron: '*/30 * * * *'     # Every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest configs (Raw format)
        run: |
          echo "Fetching latest V2Ray nodes..."
          curl -s "https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/refs/heads/main/V2Ray-Config-By-EbraSha-All-Type.txt" -o temp.txt
          
          # Keep only valid proxy links
          grep -E '^(vmess://|vless://|trojan://|ss://)' temp.txt | head -n 250 > sub.txt
          
          echo "✅ Updated with $(wc -l < sub.txt) nodes"
          rm temp.txt

      - name: Commit & Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet sub.txt; then
            echo "No new nodes. Nothing to commit."
          else
            git add sub.txt
            git commit -m "Update subscription - $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "Subscription updated successfully!"
          fi
