name: Update V2Ray Subscription

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch & Generate Base64 Subscription
        run: |
          echo "Fetching latest nodes..."
          curl -s "https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/refs/heads/main/V2Ray-Config-By-EbraSha-All-Type.txt" -o configs.txt
          
          # Extract valid links
          grep -E '^(vmess://|vless://|trojan://|ss://)' configs.txt | head -n 200 > raw.txt
          
          # Convert to Base64 (this is the key part V2RayN expects)
          base64 -w 0 raw.txt > sub.txt
          
          echo "Generated Base64 subscription with $(wc -l < raw.txt) nodes"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet sub.txt; then
            echo "No changes."
          else
            git add sub.txt
            git commit -m "Update subscription (Base64) - $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "✅ Subscription updated!"
          fi
