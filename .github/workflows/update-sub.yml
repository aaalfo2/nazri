name: Update V2Ray Subscription

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Raw Subscription (Plain Text)
        run: |
          echo "Fetching latest configs..."
          curl -s "https://raw.githubusercontent.com/ebrasha/free-v2ray-public-list/refs/heads/main/V2Ray-Config-By-EbraSha-All-Type.txt" -o configs.txt
          
          # Clean output - only valid links, Unix line endings, no extra spaces
          grep -E '^(vmess://|vless://|trojan://|ss://)' configs.txt | head -n 200 | tr -d '\r' > sub.txt
          
          echo "Created raw subscription with $(wc -l < sub.txt) nodes"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet sub.txt; then
            echo "No changes."
          else
            git add sub.txt
            git commit -m "Update raw subscription - $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
